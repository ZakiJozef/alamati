name: alamati_app
description: "3alamati (علامتي) - Your Local Business Directory in Algeria"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  
  # State Management
  provider: ^6.1.2
  
  # Networking
  http: ^1.2.0
  web_socket_channel: ^2.4.0  # For Laravel Reverb WebSocket
  
  # Local Storage
  shared_preferences: ^2.2.2
  
  # UI Components
  google_fonts: ^6.2.1
  cached_network_image: ^3.3.1
  carousel_slider: ^5.0.0
  flutter_rating_bar: ^4.0.1
  shimmer: ^3.0.0
  
  # Maps
  flutter_map: ^6.1.0
  latlong2: ^0.9.0
  webview_flutter: ^4.10.0
  
  # QR Code
  qr_flutter: ^4.1.0
  mobile_scanner: ^5.1.1
  
  # Utilities
  url_launcher: ^6.3.2
  share_plus: ^7.2.2
  intl: ^0.19.0
  image_picker: ^1.0.7
  
  # Icons
  font_awesome_flutter: ^10.7.0
  dropdown_search: ^6.0.2
  
  # Charts
  fl_chart: ^1.1.1
  go_router: ^17.0.1
  seo: ^0.0.10
  geolocator: ^14.0.2
  file_picker: ^10.3.10

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
